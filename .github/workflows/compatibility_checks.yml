name: Post-Release Compatibility Matrix

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false  # keep testing other combos even if one fails
      matrix:
        deps: ["min", "latest", "pre"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install project & test dependencies
        run: |
          python -m pip install --upgrade pip
          # Install your project + test framework
          pip install -e ".[dev]"

      - name: Run compatibility tests
        run: |
          # Replace with your test/compatibility command
          pytest tests/ --tb=short -v -p no:warnings